<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f1419" />
    <meta name="description" content="AI workspace process health scan and cold-start pack" />
    <title>Scopegate</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/source/assets/images/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/source/assets/images/icon-192.png" />
    <!-- modulepreload:build-web -->
    <link rel="modulepreload" href="/source/shared/permissions.js" />
    <link rel="modulepreload" href="/source/shared/file-bridge.js" />
    <link rel="modulepreload" href="/source/app/scan.js" />
    <link rel="modulepreload" href="/source/app/state.js" />
    <link rel="modulepreload" href="/source/app/app.js" />
    <link rel="stylesheet" href="/source/app/style.css" />
  </head>
  <body>
    <header>
      <div>
        <h1>Scopegate</h1>
        <p>Pre-flight for multi-LM workspaces — grade process health, emit a cold-start pack.</p>
      </div>
      <div class="actions">
        <button type="button" class="primary" id="pick-btn">Open workspace folder</button>
        <button type="button" id="rescan-btn">Rescan</button>
        <button type="button" id="copy-btn">Copy pack</button>
        <button type="button" id="download-btn">Download .md</button>
        <button type="button" id="demo-good" title="No folder needed">Demo: healthy</button>
        <button type="button" id="demo-bad" title="No folder needed">Demo: sick</button>
      </div>
    </header>
    <main>
      <section class="panel">
        <h2>Status</h2>
        <p id="status" data-tone="muted">…</p>
        <div class="grade-wrap">
          <span id="grade">—</span>
          <span class="detail">Overall process grade</span>
        </div>
      </section>
      <section class="panel">
        <h2>Scores</h2>
        <ul id="scores"></ul>
      </section>
      <section class="panel">
        <h2>Suggested fixes</h2>
        <ul id="findings"></ul>
      </section>
      <section class="panel span-2">
        <h2>Cold start pack</h2>
        <pre id="pack"></pre>
      </section>
    </main>
    <footer>Local-first · HTTPS · no account · Folder access stays on your machine</footer>
    <script type="module" src="/source/app/app.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
