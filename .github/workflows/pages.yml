# Deploy static Scopegate UI to GitHub Pages (project site).
# Pages source must be GitHub Actions (Settings ? Pages).
# Repo Settings → Pages → Source: GitHub Actions (one-time if not already set).
name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site
        run: |
          set -euo pipefail
          mkdir -p _site
          cp index.html 404.html manifest.json service-worker.js _site/
          cp -r source _site/source
          # No machine paths; demos + folder picker work on https origin.

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
