name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Unit tests
        run: npm test
      - name: Scan self (workspace parent not in repo — pack fixture only)
        run: |
          node --input-type=module -e "
          import { analyzeWorkspace, demoFixtures } from './source/app/scan.js';
          const r = analyzeWorkspace(demoFixtures().healthy);
          if (!r.briefing || !r.coldStart) process.exit(1);
          if (!['A','B'].includes(r.grade)) process.exit(1);
          console.log('fixture', r.grade, 'ok');
          "
